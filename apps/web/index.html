<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		
		<!-- SEO Meta Tags -->
		<title>SN Trendy Collections - Premium Sarees, Kurtis & Ethnic Wear</title>
		<meta name="description" content="Discover premium sarees, kurtis, lehengas, and ethnic wear at SN Trendy Collections. Authentic Indian fashion with free shipping across India. Shop now!" />
		<meta name="keywords" content="sarees online, kurtis, lehengas, ethnic wear, Indian fashion, designer sarees, silk sarees, cotton sarees, wedding wear, party wear, sntrendycollections" />
		<meta name="author" content="SN Trendy Collections" />
		<meta name="robots" content="index, follow" />
		<link rel="canonical" href="https://sntrendycollections.in" />
		
		<!-- Favicon -->
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		
		<!-- Google Fonts - Elegant Typography -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
		
		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://sntrendycollections.in" />
		<meta property="og:title" content="SN Trendy Collections - Premium Ethnic Wear" />
		<meta property="og:description" content="Discover premium sarees, kurtis, lehengas, and ethnic wear. Authentic Indian fashion with free shipping." />
		<meta property="og:image" content="https://sntrendycollections.in/og-image.jpg" />
		<meta property="og:site_name" content="SN Trendy Collections" />
		
		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:url" content="https://sntrendycollections.in" />
		<meta name="twitter:title" content="SN Trendy Collections - Premium Ethnic Wear" />
		<meta name="twitter:description" content="Discover premium sarees, kurtis, lehengas, and ethnic wear." />
		<meta name="twitter:image" content="https://sntrendycollections.in/og-image.jpg" />
		
		<!-- Structured Data -->
		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "Organization",
			"name": "SN Trendy Collections",
			"url": "https://sntrendycollections.in",
			"logo": "https://sntrendycollections.in/logo.png",
			"description": "Premium ethnic wear and saree collections",
			"contactPoint": {
				"@type": "ContactPoint",
				"contactType": "customer service",
				"availableLanguage": ["English", "Hindi"]
			},
			"address": {
				"@type": "PostalAddress",
				"addressCountry": "IN"
			}
		}
		</script>
		
		<!-- Theme Color -->
		<meta name="theme-color" content="#1e40af" />
	</head>
	<body>
		<!-- Loading Overlay -->
		<div id="app-loading" style="position:fixed;inset:0;background:#1e40af;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;font-family:system-ui,sans-serif;">
			<div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
			<p style="margin-top:16px;font-size:14px;opacity:0.9;">Loading SN Trendy Collections...</p>
		</div>
		<style>@keyframes spin{to{transform:rotate(360deg);}}</style>
		
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
		
		<!-- Remove loading overlay when app loads -->
		<script>
			window.addEventListener('load', function() {
				setTimeout(function() {
					const loading = document.getElementById('app-loading');
					if (loading) loading.style.display = 'none';
				}, 500);
			});
		</script>
	</body>
</html>
