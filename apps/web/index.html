		<div id="app-loading" style="position:fixed;inset:0;background:#11112d;color:#f5f5dc;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;font-family:system-ui,sans-serif;">

		<style>@keyframes spin{to{transform:rotate(360deg);}}</style>
		
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
		
		<!-- Error Handler -->
		<script>
			// Detect localhost environment
			const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
			
			// Global error handler
			window.addEventListener('error', function(e) {
				if (isLocalhost) {
					// Suppress CORS errors in development
					if (e.message && (e.message.includes('CORS') || e.message.includes('Cross-Origin'))) {
						e.preventDefault();
						return false;
					}
				}
			});
			
			// Remove loading overlay when app loads
			window.addEventListener('load', function() {
				setTimeout(function() {
					const loading = document.getElementById('app-loading');
					if (loading) {
						loading.style.opacity = '0';
						loading.style.transition = 'opacity 0.3s';
						setTimeout(() => loading.style.display = 'none', 300);
					}
				}, 500);
			});
			
			// Remove loading if React app mounts
			const observer = new MutationObserver(function() {
				const root = document.getElementById('root');
				if (root && root.children.length > 0) {
					const loading = document.getElementById('app-loading');
					if (loading) {
						loading.style.opacity = '0';
						loading.style.transition = 'opacity 0.3s';
						setTimeout(() => loading.style.display = 'none', 300);
					}
					observer.disconnect();
				}
			});
			observer.observe(document.getElementById('root'), { childList: true });
		</script>
